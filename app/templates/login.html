{% extends 'base.html' %}
{% block title %}Login - IOCL Logix{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div
        class="bg-white dark:bg-zinc-900/50 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200 dark:border-zinc-800 transition-all duration-200">
        <h2 class="text-3xl font-bold text-center mb-8 text-slate-900 dark:text-white">Welcome Back</h2>
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Username
                    / Employee ID</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 bg-white dark:bg-zinc-950 border border-slate-300 dark:border-zinc-800 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all"
                    placeholder="e.g. 00507733">
            </div>
            <div>
                <label for="password"
                    class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 bg-white dark:bg-zinc-950 border border-slate-300 dark:border-zinc-800 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-white dark:focus:ring-offset-black transition-all transform hover:scale-[1.02]">
                Sign In
            </button>
        </form>

    </div>
</div>
{% endblock %}
